<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <title>SGOVI - Inici de sesió</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
<main class="container">
    <h1>Accés</h1>
    <form action="#" th:action="@{/login}" th:object="${user}" method="post">


        <div class="row mb-3">
            <label for="username"
                   class="col-sm-2 col-form-label">Nom d'usuari:</label>
            <div class="col-sm-3">
                <input id="username" class="form-control"
                       type="text" th:field="*{username}" />
            </div>
            <div class="col-sm-4">
                <div th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}" class="error">
                </div>
            </div>
        </div>


        <div class="row mb-3">
            <label for="password"
                   class="col-sm-2 col-form-label">Contrasenya:</label>
            <div class="col-sm-3">
                <input id="password" class="form-control"
                       type="password" th:field="*{password}" />
            </div>
            <div class="col-sm-4">
                <div th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}" class="error">
                </div>
            </div>
        </div>


        <div class="row">
            <div class="col-sm-3 offset-sm-2">
                <button type="submit"
                        class="btn btn-primary">Accedir</button>
            </div>
        </div>
    </form>
</main>
</body>
</html>
