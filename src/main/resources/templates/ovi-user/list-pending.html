<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8"/>
  <title>Sol·licituds Pendents</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
  <h1>Sol·licituds de Registre Pendents</h1>

  <!-- Navegació entre estats -->
  <div class="mb-3">
    <a th:href="@{/ovi-user/list}" class="btn btn-outline-secondary btn-sm">Tots</a>
    <a th:href="@{/ovi-user/list/pending}" class="btn btn-warning btn-sm">Pendents</a>
    <a th:href="@{/ovi-user/list/accepted}" class="btn btn-outline-success btn-sm">Acceptats</a>
    <a th:href="@{/ovi-user/list/refused}" class="btn btn-outline-danger btn-sm">Rebutjats</a>
  </div>

  <table class="table table-striped">
    <thead>
    <tr>
      <th scope="col">Nom</th>
      <th scope="col">Cognoms</th>
      <th scope="col">DNI/NIE</th>
      <th scope="col">Email</th>
      <th scope="col">Telèfon</th>
      <th scope="col">Acceptar/Rebutjar</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="oviUser : ${oviUsers}">
      <td th:text="${oviUser.name}"></td>
      <td th:text="${oviUser.surname}"></td>
      <td th:text="${oviUser.dniNie}"></td>
      <td th:text="${oviUser.email}"></td>
      <td th:text="${oviUser.phone}"></td>
      <td>
        <form th:action="@{/ovi-user/accept/{id}(id=${oviUser.idOviUser})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-success btn-sm">Acceptar</button>
        </form>

        <a th:href="@{/ovi-user/reject/{id}(id=${oviUser.idOviUser})}" class="btn btn-danger btn-sm">Rebutjar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/}" class="btn btn-secondary">Tornar</a>
</main>
</body>
</html>
