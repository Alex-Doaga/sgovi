<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGOVI - Perfil d'Usuari OVI</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head>
<body>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-person-circle me-2 text-primary"></i>Perfil d'Usuari OVI</h1>
        <a th:href="@{/ovi-user/list/accepted}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Tornar a la llista
        </a>
    </div>

    <div class="row">
        <div class="col-md-15">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Informació Personal</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Nom:</strong> <span th:text="${oviUser.name}"></span></p>
                            <p><strong>Cognoms:</strong> <span th:text="${oviUser.surname}"></span></p>
                            <p><strong>DNI/NIE:</strong> <span th:text="${oviUser.dniNie}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Email:</strong> <span th:text="${oviUser.email}"></span></p>
                            <p><strong>Telèfon:</strong> <span th:text="${oviUser.phone}"></span></p>
                            <p><strong>Adreça:</strong> <span th:text="${oviUser.address}"></span></p>
                            <p><strong>Codi postal:</strong> <span th:text="${oviUser.postalCode}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${isReviewMode}" class="mt-4 p-3 bg-light rounded border d-flex gap-2">
                <h5 class="w-100 align-self-center mb-0 text-muted">
                    <i class="bi bi-shield-shaded me-2"></i>Accions de revisió técnica:
                </h5>

                <a th:href="@{/ovi-user/accept/confirm/{id}(id=${oviUser.idOviUser})}" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i> Acceptar Registre
                </a>

                <a th:href="@{/ovi-user/reject/{id}(id=${oviUser.idOviUser})}" class="btn btn-danger">
                    <i class="bi bi-x-circle me-1"></i> Rebutjar
                </a>
            </div>
        </div>
    </div>


</main>

</body>
</html>
