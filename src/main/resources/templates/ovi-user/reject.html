<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Rechazar Solicitud</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Rechazar Solicitud de Usuario OVI</h1>

    <div class="alert alert-warning" role="alert">
        Por favor, indica el motivo por el cual se rechaza esta solicitud.
    </div>

    <form th:action="@{/ovi-user/reject}" th:object="${oviUser}" method="post">
        <input type="hidden" th:field="*{idOviUser}"/>

        <div class="mb-3">
            <label for="rejectionReason" class="form-label">Motiu del rebuig</label>
            <textarea class="form-control" id="rejectionReason" rows="4"
                      th:field="*{rejectionReason}" required></textarea>
        </div>

        <button type="submit" class="btn btn-danger">Confirmar Rebuig</button>
        <a th:href="@{/ovi-user/list/pending}" class="btn btn-secondary ms-2">Cancel·lar</a>
    </form>
</main>
</body>
</html>
