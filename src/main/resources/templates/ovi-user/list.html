<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestió d'Usuaris OVI</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Llista d'Usuaris OVI</h1>

    <!-- Filtre per estat -->
    <div class="mb-3">
        <a th:href="@{/ovi-user/list}" class="btn btn-outline-secondary btn-sm">Tots</a>
        <a th:href="@{/ovi-user/list/pending}" class="btn btn-outline-warning btn-sm">Pendents</a>
        <a th:href="@{/ovi-user/list/accepted}" class="btn btn-outline-success btn-sm">Acceptats</a>
        <a th:href="@{/ovi-user/list/refused}" class="btn btn-outline-danger btn-sm">Rebutjats</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">Nom</th>
            <th scope="col">Cognoms</th>
            <th scope="col">DNI/NIE</th>
            <th scope="col">Email</th>
            <th scope="col">Telèfon</th>
            <th scope="col">Estat</th>
            <th scope="col"></th>
            <th scope="col"></th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="oviUser : ${oviUsers}">
            <td th:text="${oviUser.name}"></td>
            <td th:text="${oviUser.surname}"></td>
            <td th:text="${oviUser.dniNie}"></td>
            <td th:text="${oviUser.email}"></td>
            <td th:text="${oviUser.phone}"></td>
            <td th:text="${oviUser.oviUserState}"></td>
            <td>
                <a th:href="@{/ovi-user/update/{id}(id=${oviUser.idOviUser})}"
                   class="btn btn-warning btn-sm">Edita</a>
            </td>
            <td>
                <a th:href="@{/ovi-user/delete/{id}(id=${oviUser.idOviUser})}"
                   class="btn btn-danger btn-sm">Esborra</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="add" class="btn btn-success">Afegeix usuari</a>
    <a href="/" class="btn btn-secondary ms-2">Tornar</a>
</main>
</body>
</html>
