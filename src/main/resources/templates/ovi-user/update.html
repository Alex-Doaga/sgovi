<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Editar Usuari OVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4 mb-5">
    <h1>Editar Perfil d'Usuari OVI</h1>
    <hr>

    <form th:action="@{/ovi-user/update}" th:object="${oviUser}" method="post" class="row g-3">

        <input type="hidden" th:field="*{idOviUser}"/>
        <input type="hidden" th:field="*{oviUserState}"/>
        <input type="hidden" th:field="*{rejectionReason}"/>

        <h2 class="h5 mt-4">Dades Personals</h2>

        <div class="col-md-4">
            <label for="name" class="form-label">Nom</label>
            <input type="text"
                   th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                   id="name" th:field="*{name}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="col-md-4">
            <label for="surname" class="form-label">Cognoms</label>
            <input type="text"
                   th:class="${#fields.hasErrors('surname')} ? 'form-control is-invalid' : 'form-control'"
                   id="surname" th:field="*{surname}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></div>
        </div>

        <div class="col-md-4">
            <label for="dniNie" class="form-label">DNI/NIE</label>
            <input type="text"
                   th:class="${#fields.hasErrors('dniNie')} ? 'form-control is-invalid' : 'form-control'"
                   id="dniNie" th:field="*{dniNie}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dniNie')}" th:errors="*{dniNie}"></div>
        </div>

        <div class="col-md-4">
            <label for="birthDate" class="form-label">Data de Naixement</label>
            <input type="date"
                   th:class="${#fields.hasErrors('birthDate')} ? 'form-control is-invalid' : 'form-control'"
                   id="birthDate" th:field="*{birthDate}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
        </div>

        <h2 class="h5 mt-4">Contacte i Localització</h2>

        <div class="col-md-6">
            <label for="email" class="form-label">Correu Electrònic</label>
            <input type="email"
                   th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                   id="email" th:field="*{email}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="col-md-6">
            <label for="phone" class="form-label">Telèfon</label>
            <input type="text"
                   th:class="${#fields.hasErrors('phone')} ? 'form-control is-invalid' : 'form-control'"
                   id="phone" th:field="*{phone}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
        </div>

        <div class="col-md-12">
            <label for="address" class="form-label">Adreça</label>
            <input type="text"
                   th:class="${#fields.hasErrors('address')} ? 'form-control is-invalid' : 'form-control'"
                   id="address" th:field="*{address}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
        </div>

        <div class="col-md-6">
            <label for="city" class="form-label">Ciutat</label>
            <input type="text"
                   th:class="${#fields.hasErrors('city')} ? 'form-control is-invalid' : 'form-control'"
                   id="city" th:field="*{city}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
        </div>

        <div class="col-md-6">
            <label for="postalCode" class="form-label">Codi Postal</label>
            <input type="text"
                   th:class="${#fields.hasErrors('postalCode')} ? 'form-control is-invalid' : 'form-control'"
                   id="postalCode" th:field="*{postalCode}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></div>
        </div>

        <h2 class="h5 mt-4">Dades OVI i Entitat</h2>

        <div class="col-md-6">
            <label for="entity" class="form-label">Entitat</label>
            <input type="text"
                   th:class="${#fields.hasErrors('entity')} ? 'form-control is-invalid' : 'form-control'"
                   id="entity" th:field="*{entity}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('entity')}" th:errors="*{entity}"></div>
        </div>

        <div class="col-md-6">
            <label for="socialServiceCenter" class="form-label">Centre de serveis socials</label>
            <input type="text" class="form-control" id="socialServiceCenter" th:field="*{socialServiceCenter}"/>
        </div>

        <h2 class="h5 mt-4">Dades Addicionals (Opcional)</h2>

        <div class="col-md-6">
            <label for="nameTutor" class="form-label">Nom del Tutor/a</label>
            <input type="text" class="form-control" id="nameTutor" th:field="*{nameTutor}"/>
        </div>

        <div class="col-md-6">
            <label for="dniNieTutor" class="form-label">DNI/NIE Tutor/a</label>
            <input type="text"
                   th:class="${#fields.hasErrors('dniNieTutor')} ? 'form-control is-invalid' : 'form-control'"
                   id="dniNieTutor" th:field="*{dniNieTutor}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dniNieTutor')}" th:errors="*{dniNieTutor}"></div>
        </div>

        <div class="col-md-4 d-flex align-items-center">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="hasDepenDegree" th:field="*{hasDepenDegree}"/>
                <label for="hasDepenDegree" class="form-check-label">Té grau de dependència</label>
            </div>
        </div>

        <div class="col-md-4">
            <label for="depenDegree" class="form-label">Grau (1-3)</label>
            <input type="number"
                   th:class="${#fields.hasErrors('depenDegree')} ? 'form-control is-invalid' : 'form-control'"
                   id="depenDegree" th:field="*{depenDegree}" min="1" max="3"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('depenDegree')}" th:errors="*{depenDegree}"></div>
        </div>

        <div class="col-md-4">
            <label for="projectLifeDoc" class="form-label">URL Document Projecte de Vida</label>
            <input type="text"
                   th:class="${#fields.hasErrors('projectLifeDoc')} ? 'form-control is-invalid' : 'form-control'"
                   id="projectLifeDoc" th:field="*{projectLifeDoc}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('projectLifeDoc')}" th:errors="*{projectLifeDoc}"></div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-warning">Actualitzar Usuari</button>
            <a th:href="@{/ovi-user/list}" class="btn btn-secondary">Cancel·lar</a>
        </div>
    </form>
</main>
</body>
</html>
