<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Editar Contracte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Editar Contracte</h1>
    <hr>

    <form th:action="@{/contract/update}" th:object="${contract}" method="post" class="row g-3">
        <input type="hidden" th:field="*{idContract}" />
        <input type="hidden" th:field="*{idRequest}" />

        <div class="col-md-6 mb-3">
            <label for="idPa" class="form-label">ID Assistent Personal (PA)</label>
            <input type="number"
                   th:class="${#fields.hasErrors('idPa')} ? 'form-control is-invalid' : 'form-control'"
                   id="idPa" th:field="*{idPa}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idPa')}" th:errors="*{idPa}">
                Error en el ID del PA
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="contractState" class="form-label">Estat del contracte</label>
            <select th:class="${#fields.hasErrors('contractState')} ? 'form-select is-invalid' : 'form-select'"
                    id="contractState" th:field="*{contractState}">
                <option value="activo">Actiu</option>
                <option value="finalizado">Finalitzat</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('contractState')}" th:errors="*{contractState}">
                Error en l'estat
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="startDate" class="form-label">Data d'Inici</label>
            <input type="date"
                   th:class="${#fields.hasErrors('startDate')} ? 'form-control is-invalid' : 'form-control'"
                   id="startDate" th:field="*{startDate}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}">
                Error en la data d'inici
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="endDate" class="form-label">Data de Finalització</label>
            <input type="date"
                   th:class="${#fields.hasErrors('endDate')} ? 'form-control is-invalid' : 'form-control'"
                   id="endDate" th:field="*{endDate}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}">
                Error en la data de finalització
            </div>
        </div>

        <div class="col-md-12 mb-3">
            <label for="contractDocument" class="form-label">URL del Document (PDF/Drive)</label>
            <input type="text"
                   th:class="${#fields.hasErrors('contractDocument')} ? 'form-control is-invalid' : 'form-control'"
                   id="contractDocument" th:field="*{contractDocument}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('contractDocument')}" th:errors="*{contractDocument}">
                Error en el document
            </div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-warning">Actualitzar Contracte</button>
            <a th:href="@{/contract/list}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</main>
</body>
</html>
