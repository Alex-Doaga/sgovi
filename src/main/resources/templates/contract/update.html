<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Editar Contracte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Editar Contracte</h1>
    <hr>

    <form th:action="@{/contract/update}" th:object="${contract}" method="post" class="row g-3">
        <input type="hidden" th:field="*{idContract}" />
        <input type="hidden" th:field="*{idRequest}" />

        <div class="col-md-6">
            <label for="idPa" class="form-label">ID Assistent Personal (PA)</label>
            <input type="number" class="form-control" id="idPa" th:field="*{idPa}" required/>
        </div>

        <div class="col-md-6">
            <label for="contractState" class="form-label">Estat del contracte</label>
            <select class="form-select" id="contractState" th:field="*{contractState}">
                <option value="activo">Actiu</option>
                <option value="finalizado">Finalitzat</option>
            </select>
        </div>

        <div class="col-md-6">
            <label for="startDate" class="form-label">Data d'Inici</label>
            <input type="date" class="form-control" id="startDate" th:field="*{startDate}" required/>
        </div>

        <div class="col-md-6">
            <label for="endDate" class="form-label">Data de Finalització</label>
            <input type="date" class="form-control" id="endDate" th:field="*{endDate}"/>
        </div>

        <div class="col-md-12">
            <label for="contractDocument" class="form-label">URL del Document (PDF/Drive)</label>
            <input type="text" class="form-control" id="contractDocument" th:field="*{contractDocument}"/>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-warning">Guardar Canvis</button>
            <a th:href="@{/contract/list}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</main>
</body>
</html>
