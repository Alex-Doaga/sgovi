<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Editar Contracte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Editar Contracte</h1>
    <hr>

    <form th:action="@{/contract/update}" th:object="${contract}" method="post">
        <input type="hidden" th:field="*{idContract}" />
        <input type="hidden" th:field="*{idRequest}" />
        <input type="hidden" th:field="*{idPa}" />
        <input type="hidden" th:field="*{contractState}" />
        <input type="hidden" th:field="*{startDate}" />
        <input type="hidden" th:field="*{endDate}" />

        <div class="mb-3">
            <label for="contractDocument" class="form-label">URL del Document (PDF/Drive)</label>
            <input type="text"
                   th:class="${#fields.hasErrors('contractDocument')} ? 'form-control is-invalid' : 'form-control'"
                   id="contractDocument" th:field="*{contractDocument}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('contractDocument')}" th:errors="*{contractDocument}">
                Error en el document
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-warning">Actualitzar URL</button>
            <a th:href="@{/contract/list/user/{id}(id=${idUser})}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</main>
</body>
</html>
