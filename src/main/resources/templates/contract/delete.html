<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Eliminar Contracte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Eliminar Contracte</h1>

    <div class="alert alert-danger" role="alert">
        Esteu segur que voleu eliminar aquest contracte? Aquesta acció no es pot desfer.
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <p><strong>ID Contracte:</strong> <span th:text="${contract.idContract}"></span></p>
            <p><strong>ID Sol·licitud:</strong> <span th:text="${contract.idRequest}"></span></p>
            <p><strong>ID Assistent (PA):</strong> <span th:text="${contract.idPa}"></span></p>
            <p><strong>Data Inici:</strong> <span th:text="${contract.startDate}"></span></p>
            <p><strong>Estat:</strong> <span th:text="${contract.contractState}"></span></p>
        </div>
    </div>

    <form th:action="@{/contract/delete}" th:object="${contract}" method="post">
        <input type="hidden" th:field="*{idContract}"/>

        <button type="submit" class="btn btn-danger">Confirmar Eliminació</button>
        <a th:href="@{/contract/list}" class="btn btn-outline-secondary">Cancel·lar</a>
    </form>
</main>
</body>
</html>
