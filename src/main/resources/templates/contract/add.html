<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Nou Contracte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <h1>Registrar Nou Contracte</h1>
    <hr>

    <form th:action="@{/contract/add/user}" th:object="${contract}" method="post" class="row g-3">
        <input type="hidden" th:value="${idUser}" name="idUser" />
        <input type="hidden" th:field="*{contractState}" />

        <div class="col-md-6 mb-3">
            <label for="idRequest" class="form-label">Selecciona la Sol·licitud</label>
            <select th:class="${#fields.hasErrors('idRequest')} ? 'form-select is-invalid' : 'form-select'"
                    id="idRequest" th:field="*{idRequest}" required>
                <option value="">Selecciona una sol·licitud</option>
                <option th:each="request : ${requests}" th:value="${request.idRequest}" th:text="${'Sol·licitud ' + request.idRequest + ' - ' + request.startDate}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idRequest')}" th:errors="*{idRequest}">
                Error en la sol·licitud
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="idPa" class="form-label">Assistent Personal (PA)</label>
            <select th:class="${#fields.hasErrors('idPa')} ? 'form-select is-invalid' : 'form-select'"
                    id="idPa" th:field="*{idPa}" required>
                <option value="">Selecciona un assistent</option>
                <option th:each="pa : ${pas}" th:value="${pa.idPa}" th:text="${pa.name + ' ' + pa.surname}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idPa')}" th:errors="*{idPa}">
                Error en l'assistent
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="contractDocument" class="form-label">URL del Document (PDF/Drive)</label>
            <input type="text"
                   th:class="${#fields.hasErrors('contractDocument')} ? 'form-control is-invalid' : 'form-control'"
                   id="contractDocument" th:field="*{contractDocument}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('contractDocument')}" th:errors="*{contractDocument}">
                Error en el document
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="startDate" class="form-label">Data d'Inici</label>
            <input type="date"
                   th:class="${#fields.hasErrors('startDate')} ? 'form-control is-invalid' : 'form-control'"
                   id="startDate" th:field="*{startDate}" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}">
                Error en la data d'inici
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label for="endDate" class="form-label">Data de Finalització (opcional)</label>
            <input type="date"
                   th:class="${#fields.hasErrors('endDate')} ? 'form-control is-invalid' : 'form-control'"
                   id="endDate" th:field="*{endDate}"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}">
                Error en la data de finalització
            </div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Crear Contracte</button>
            <a th:href="@{/contract/list/user/{id}(id=${idUser})}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</main>
</body>
</html>
