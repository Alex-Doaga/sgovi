<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestió de Contractes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Contractes</h1>
        <div>
            <a th:if="${isUserView}" th:href="@{/contract/add/user/{id}(id=${userId})}" class="btn btn-primary me-2">Afegir Contracte</a>
            <a th:if="${isUserView}" th:href="@{/ovi-user/dashboard}" class="btn btn-secondary">Tornar al Dashboard</a>
            <a th:unless="${isUserView}" th:href="@{/ovi-user/list/accepted}" class="btn btn-secondary">Tornar a Usuaris</a>
        </div>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Sol·licitud</th>
            <th>PA (Assistent)</th>
            <th>Inici</th>
            <th>Fi</th>
            <th>Estat</th>
            <th>Document</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contract : ${contracts}">
            <td th:text="${contract.idContract}"></td>
            <td th:text="${contract.idRequest}"></td>
            <td>
                <span th:with="pa=${paDao.getPA(contract.idPa)}"
                      th:text="${pa.name + ' ' + pa.surname}">
                </span>
            </td>
            <td th:text="${contract.startDate}"></td>
            <td th:text="${contract.endDate}"></td>
            <td>
                <span th:text="${contract.contractState}"
                      th:class="${contract.contractState == 'activo' ? 'badge bg-success' : 'badge bg-secondary'}">
                </span>
            </td>
            <td>
                <span
                th:text="${contract.contractDocument}">
                </span>
            <td>
                <a th:href="@{/contract/update/{id}(id=${contract.idContract})}"
                   class="btn btn-warning btn-sm">Editar</a>

            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(contracts)}">
            <td colspan="8" class="text-center text-muted">No hi ha contractes registrats per aquest criteri.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
