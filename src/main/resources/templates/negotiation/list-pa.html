<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Llistat Negociacions</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-calendar-event me-2 text-primary"></i>Llista de Negociacions</h1>

        <a th:href="@{/pa/dashboard}"
           class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
            Tornar
        </a>
    </div>
    <hr>

    <table class="table table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>Usuari ovi</th>
            <th>Solicitud</th>
            <th>Estat negociació</th>
            <th>Accions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="negotiation : ${negotiations}">

            <td th:text="${negotiation.getOviUser().getName() + ' ' + negotiation.getOviUser().getSurname()}"></td>
            <td th:text="${negotiation.getRequest().getIdRequest()}"></td>

            <td>
                <span th:if="${negotiation.getNegotiation().getNegotiationState() == 'hablando'}" class="badge bg-success">
                    Hablando
                </span>
                <span th:if="${negotiation.getNegotiation().getNegotiationState() == 'sinHablar'}" class="badge bg-warning text-dark">
                    Sin hablar
                </span>
                <span th:if="${negotiation.getNegotiation().getNegotiationState() == null}" class="badge bg-secondary">
                    Sense negociació
                </span>
            </td>

            <td>
                <a class="btn btn-outline-primary btn-sm" th:if="${negotiation.getNegotiation().getNegotiationState() == 'hablando'}" th:href="@{/negotiation/details/{idPa}/{idRequest}(idPa=${negotiation.getNegotiation().getIdPa()}, idRequest=${negotiation.getRequest().getIdRequest()})}">
                    <i class="bi bi-chat-dots"></i>
                    Veure conversació
                </a>
            </td>

        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
