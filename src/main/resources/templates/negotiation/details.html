<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">

<head>
    <meta charset="UTF-8">
    <title>Conversació</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>

        .chat-container {
            max-width: 1100px;
            margin: auto;
        }

        .chat-box {
            height: 550px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            background-color: #f8f9fa;
            padding: 20px;
        }

        .message-left {
            text-align: left;
            margin-bottom: 15px;
        }

        .message-right {
            text-align: right;
            margin-bottom: 15px;
        }

        .bubble-left {
            display: inline-block;
            max-width: 70%;
            background-color: white;
            border: 1px solid #dee2e6;
            border-radius: 15px;
            padding: 10px 15px;
        }

        .bubble-right {
            display: inline-block;
            max-width: 70%;
            background-color: #0d6efd;
            color: white;
            border-radius: 15px;
            padding: 10px 15px;
        }

        .message-date {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 4px;
        }

    </style>

</head>

<body>

<div class="container mt-4 chat-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-chat-dots me-2 text-primary"></i>
            Conversació
        </h2>

        <a th:href="@{/negotiation/list/{id}(id=${request.getOviUserId()})}"
           class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
            Tornar
        </a>
    </div>

    <!-- INFORMACIÓ NEGOCIACIÓ -->
    <div class="card mb-4">

        <div class="card-header">
            <strong>Informació de la negociació</strong>
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-3">
                    <strong>ID Negociació:</strong><br>
                    <span th:text="${negotiation.idNegotiation}"></span>
                </div>

                <div class="col-md-3">
                    <strong>Data inici:</strong><br>
                    <span th:text="${negotiation.startDate}"></span>
                </div>

                <div class="col-md-3">
                    <strong>Estat:</strong><br>

                    <span th:if="${negotiation.negotiationState == 'hablando'}"
                          class="badge bg-success">
                        Hablando
                    </span>

                    <span th:if="${negotiation.negotiationState == 'sinHablar'}"
                          class="badge bg-warning text-dark">
                        Sin hablar
                    </span>

                </div>

                <div class="col-md-3">
                    <strong>PA:</strong><br>
                    <span th:text="${pa.name + ' ' + pa.surname}"></span>
                </div>

            </div>

        </div>

    </div>

    <!-- CHAT -->
    <div class="card">
        <div class="card-header">
            <i class="bi bi-chat-left-text me-2"></i>
            Missatges
        </div>

        <div class="card-body">
            <div class="chat-box">
                <div th:if="${#lists.isEmpty(messages)}"
                     class="text-center text-muted mt-5">

                    <i class="bi bi-chat-square-text fs-1"></i>

                    <p class="mt-3">
                        Encara no existeixen missatges en aquesta conversa.
                    </p>

                </div>

                <div th:each="message : ${messages}">

                    <!-- MISSATGE OVI -->
                    <div th:if="${message.senderType == 'ovi_user'}"
                         class="message-right">

                        <div class="bubble-right"
                             th:text="${message.messageText}">
                        </div>

                        <div class="message-date"
                             th:text="${#temporals.format(message.dateMsg,'dd/MM/yyyy HH:mm')}">
                        </div>

                    </div>

                    <!-- MISSATGE PA -->

                    <div th:if="${message.senderType == 'pa'}"
                         class="message-left">

                        <div class="bubble-left"
                             th:text="${message.messageText}">
                        </div>

                        <div class="message-date"
                             th:text="${#temporals.format(message.dateMsg,'dd/MM/yyyy HH:mm')}">
                        </div>

                    </div>
                </div>
            </div>

            <th:block th:if="${sender == 'ovi-user'}">
                <!-- FORMULARI ENVIAMENT OVI USER-->
                <form method="post"
                      th:action="@{/negotiation/message/oviuser}"
                      class="mt-4">
                    <input type="hidden"
                           name="idNegotiation"
                           th:value="${negotiation.idNegotiation}"/>

                    <div class="mb-3">

                    <textarea class="form-control"
                              name="messageText"
                              rows="4"
                              maxlength="1000"
                              placeholder="Escriu el teu missatge..."
                              required>
                    </textarea>

                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>
                            Enviar missatge
                        </button>
                    </div>
                </form>
            </th:block>

            <th:block th:if="${sender == 'pa'}">
                <!-- FORMULARI PA -->
                <form method="post"
                      th:action="@{/negotiation/message/pa}"
                      class="mt-4">
                    <input type="hidden"
                           name="idNegotiation"
                           th:value="${negotiation.idNegotiation}"/>

                    <div class="mb-3">

                    <textarea class="form-control"
                              name="messageText"
                              rows="4"
                              maxlength="1000"
                              placeholder="Escriu el teu missatge..."
                              required>
                    </textarea>

                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>
                            Enviar missatge
                        </button>
                    </div>
                </form>
            </th:block>
        </div>
    </div>
</div>

</body>
</html>
