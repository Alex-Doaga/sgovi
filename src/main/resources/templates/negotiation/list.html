<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Llistat Negociacions</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main class="container mt-4">
    <h1><i class="bi bi-calendar-event me-2 text-primary"></i>Llista de Negociacions</h1>
    <hr>

    <table class="table table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>Candidat</th>
            <th>Estat negociació</th>
            <th>Estat contracte</th>
            <th>Accions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="negotiation : ${negotiations}">

            <td th:text="${negotiation.getPa().getName() + ' ' + negotiation.getPa().getSurname()}"></td>

            <td>
                <span th:if="${negotiation.getNegotiationState() == 'hablando'}" class="badge bg-success">
                    Hablando
                </span>
                <span th:if="${negotiation.getNegotiationState() == 'sinHablar'}" class="badge bg-warning text-dark">
                    Sin hablar
                </span>
                <span th:if="${negotiation.getNegotiationState() == null}" class="badge bg-secondary">
                    Sense negociació
                </span>
            </td>

            <td>
                <span th:if="${negotiation.contractState == 'active'}" class="badge bg-primary">
                    Actiu
                </span>
                <span th:if="${negotiation.contractState == 'finished'}" class="badge bg-dark">
                    Finalitzat
                </span>
                <span th:if="${negotiation.contractState == null}" class="badge bg-secondary">
                    Sense contracte
                </span>
            </td>

            <td>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/negotiation/details/{idPa}/{idRequest}(idPa=${negotiation.getPa().getIdPa()}, idRequest=${negotiation.getRequestId()})}">
                    <i class="bi bi-chat-dots"></i>
                    Veure conversació
                </a>
            </td>

        </tr>
        </tbody>
    </table>

    <div class="mt-4">
        <a th:href="@{/ovi-user/dashboard}" class="btn btn-secondary ms-2">Tornar</a>
    </div>
</main>
</body>
</html>
