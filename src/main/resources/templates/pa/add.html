<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Nou Assistent Personal (PA)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<main class="container mt-4 mb-5" style="max-width: 900px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h3 mb-3 text-primary"><i class="bi bi-person-plus-fill me-2"></i>Registrar Nou Assistent Personal (PA)</h1>
            <p class="text-muted">Ompli el següent formulari per a donar-se d'alta en el sistema. Els camps marcats amb * són obligatoris.</p>
            <hr>

            <form th:action="@{/pa/add}" th:object="${pa}" method="post" class="row g-3">

                <input type="hidden" th:field="*{paState}" value="PENDING" />

                <h2 class="h5 mt-4 text-secondary border-bottom pb-2">Dades Personals</h2>

                <div class="col-md-4">
                    <label for="name" class="form-label fw-bold">Nom *</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                           id="name" th:field="*{name}" placeholder="Ex: Marc" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-4">
                    <label for="surname" class="form-label fw-bold">Cognoms *</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('surname')} ? 'form-control is-invalid' : 'form-control'"
                           id="surname" th:field="*{surname}" placeholder="Ex: García Pérez" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></div>
                </div>

                <div class="col-md-4">
                    <label for="dniNie" class="form-label fw-bold">DNI / NIE *</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('dniNie')} ? 'form-control is-invalid' : 'form-control'"
                           id="dniNie" th:field="*{dniNie}" placeholder="12345678X" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('dniNie')}" th:errors="*{dniNie}"></div>
                </div>

                <div class="col-md-6">
                    <label for="birthDate" class="form-label fw-bold">Data de Naixement *</label>
                    <input type="date"
                           th:class="${#fields.hasErrors('birthDate')} ? 'form-control is-invalid' : 'form-control'"
                           id="birthDate" th:field="*{birthDate}" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
                </div>

                <div class="col-md-6">
                    <label for="gender" class="form-label fw-bold">Gènere (Opcional)</label>
                    <select id="gender" th:field="*{gender}"
                            th:class="${#fields.hasErrors('gender')} ? 'form-select is-invalid' : 'form-select'">
                        <option value="" selected>Selecciona...</option>
                        <option th:each="g : ${T(es.uji.ei1027.sgovi.modelo.enums.GenderEnum).values()}"
                                th:value="${g}" th:text="${g.label}"></option>
                    </select>
                </div>

                <h2 class="h5 mt-5 text-secondary border-bottom pb-2">Contacte i Ubicació</h2>

                <div class="col-md-6">
                    <label for="email" class="form-label fw-bold">Correu Electrònic *</label>
                    <input type="email"
                           th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                           id="email" th:field="*{email}" placeholder="nom@exemple.com" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label fw-bold">Telèfon *</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('phone')} ? 'form-control is-invalid' : 'form-control'"
                           id="phone" th:field="*{phone}" placeholder="600 000 000" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="col-md-5">
                    <label for="address" class="form-label fw-bold">Adreça *</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('address')} ? 'form-control is-invalid' : 'form-control'"
                           id="address" th:field="*{address}" placeholder="C/ Major, 1" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                </div>

                <div class="col-md-4">
                    <label for="city" class="form-label fw-bold">Ciutat *</label>
                    <select id="city" th:field="*{city}"
                            th:class="${#fields.hasErrors('city')} ? 'form-select is-invalid' : 'form-select'" required>
                        <option value="" selected disabled>Selecciona...</option>
                        <option th:each="c : ${T(es.uji.ei1027.sgovi.modelo.enums.CityEnum).values()}"
                                th:value="${c}" th:text="${c.label}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                </div>

                <div class="col-md-3">
                    <label for="postalCode" class="form-label fw-bold">Codi Postal *</label>
                    <input type="number"
                           th:class="${#fields.hasErrors('postalCode')} ? 'form-control is-invalid' : 'form-control'"
                           id="postalCode" th:field="*{postalCode}" placeholder="12XXX" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></div>
                </div>

                <h2 class="h5 mt-5 text-secondary border-bottom pb-2">Perfil Professional</h2>

                <div class="col-md-4">
                    <label for="typePa" class="form-label fw-bold">Tipus d'Assistent *</label>
                    <select id="typePa" th:field="*{typePa}"
                            th:class="${#fields.hasErrors('typePa')} ? 'form-select is-invalid' : 'form-select'" required>
                        <option value="" selected disabled>Selecciona...</option>
                        <option th:each="t : ${T(es.uji.ei1027.sgovi.modelo.enums.TypePaEnum).values()}"
                                th:value="${t}" th:text="${t}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('typePa')}" th:errors="*{typePa}"></div>
                </div>

                <div class="col-md-4">
                    <label for="education" class="form-label fw-bold">Nivell d'Educació *</label>
                    <select id="education" th:field="*{education}"
                            th:class="${#fields.hasErrors('education')} ? 'form-select is-invalid' : 'form-select'" required>
                        <option value="" selected disabled>Selecciona...</option>
                        <option th:each="e : ${T(es.uji.ei1027.sgovi.modelo.enums.EducationEnum).values()}"
                                th:value="${e}" th:text="${e.label}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('education')}" th:errors="*{education}"></div>
                </div>

                <div class="col-md-4">
                    <label for="experience" class="form-label fw-bold">Anys d'Experiència *</label>
                    <input type="number"
                           th:class="${#fields.hasErrors('experience')} ? 'form-control is-invalid' : 'form-control'"
                           id="experience" th:field="*{experience}" min="0" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}"></div>
                </div>

                <div class="col-md-6">
                    <label for="hobbies" class="form-label fw-bold">Afició Principal (Opcional)</label>
                    <select id="hobbies" th:field="*{hobbies}"
                            th:class="${#fields.hasErrors('hobbies')} ? 'form-select is-invalid' : 'form-select'">
                        <option value="" selected>Selecciona...</option>
                        <option th:each="h : ${T(es.uji.ei1027.sgovi.modelo.enums.HobbiesEnum).values()}"
                                th:value="${h}" th:text="${h.label}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="cv" class="form-label fw-bold">URL del currículum (Opcional)</label>
                    <input type="text"
                           th:class="${#fields.hasErrors('cv')} ? 'form-control is-invalid' : 'form-control'"
                           id="cv" th:field="*{cv}" placeholder="http://..."/>
                </div>

                <div class="col-md-6">
                    <label for="availabilityStartDate" class="form-label fw-bold">Inici disponibilitat (Opcional)</label>
                    <input type="date"
                           th:class="${#fields.hasErrors('availabilityStartDate')} ? 'form-control is-invalid' : 'form-control'"
                           id="availabilityStartDate" th:field="*{availabilityStartDate}"/>
                </div>

                <div class="col-md-6">
                    <label for="availabilityEndDate" class="form-label fw-bold">Fi disponibilitat (Opcional)</label>
                    <input type="date"
                           th:class="${#fields.hasErrors('availabilityEndDate')} ? 'form-control is-invalid' : 'form-control'"
                           id="availabilityEndDate" th:field="*{availabilityEndDate}"/>
                </div>

                <div class="col-12">
                    <label for="comments" class="form-label fw-bold">Comentaris</label>
                    <textarea th:class="${#fields.hasErrors('comments')} ? 'form-control is-invalid' : 'form-control'"
                              id="comments" th:field="*{comments}" rows="2"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('comments')}" th:errors="*{comments}"></div>
                </div>

                <h2 class="h5 mt-5 text-secondary border-bottom pb-2">Seguretat</h2>

                <div class="col-md-6">
                    <label for="password" class="form-label fw-bold">Contrasenya inicial *</label>
                    <input type="password"
                           th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                           id="password" th:field="*{password}" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="col-12 mt-5 d-flex justify-content-end gap-2">
                    <a th:href="@{/pa/list}" class="btn btn-outline-secondary px-4">Cancel·lar</a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-circle me-1"></i> Registrar
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
