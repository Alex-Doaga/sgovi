<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestió d'Assistents Personals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main class="container mt-4">
    <h1><i class="bi bi-people-fill me-2 text-primary"></i>Llista d'Assistents Personals (PA)</h1>
    <hr>

    <div class="mb-3 mt-4">
        <a th:href="@{/pa/list/pending}" class="btn btn-sm"
           th:classappend="${currentState == 'pending' ? 'btn-warning' : 'btn-outline-warning'}">Pendents</a>

        <a th:href="@{/pa/list/accepted}" class="btn btn-sm"
           th:classappend="${currentState == 'accepted' ? 'btn-success' : 'btn-outline-success'}">Acceptats</a>

        <a th:href="@{/pa/list/refused}" class="btn btn-sm"
           th:classappend="${currentState == 'refused' ? 'btn-danger' : 'btn-outline-danger'}">Rebutjats</a>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-striped align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>Nom</th>
                <th>Cognoms</th>
                <th>DNI/NIE</th>
                <th>Contacte</th>
                <th>Tipus PA</th>
                <th>Accions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pa : ${pas}">
                <td th:text="${pa.name}"></td>
                <td th:text="${pa.surname}"></td>
                <td th:text="${pa.dniNie}"></td>
                <td>
                    <div th:text="${pa.email}"></div>
                    <small class="text-muted" th:text="${pa.phone}"></small>
                </td>
                <td>
                    <span class="badge bg-secondary" th:text="${pa.typePa}"></span>
                </td>

                <td>
                    <div class="d-flex gap-2">

                        <th:block th:if="${currentState == 'pending'}">
                            <form th:action="@{/pa/accept/{id}(id=${pa.idPa})}" method="post">
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="bi bi-check-lg"></i> Acceptar
                                </button>
                            </form>
                            <a th:href="@{/pa/reject/{id}(id=${pa.idPa})}" class="btn btn-danger btn-sm">
                                <i class="bi bi-x-lg"></i> Rebutjar
                            </a>
                        </th:block>

                        <th:block th:if="${currentState == 'accepted'}">
                            <a th:href="@{/pa/view/{id}(id=${pa.idPa})}" class="btn btn-info btn-sm text-white">
                                <i class="bi bi-eye"></i> Veure Perfil
                            </a>
                        </th:block>

                        <th:block th:if="${currentState == 'refused'}">
                            <button type="button" class="btn btn-secondary btn-sm"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#modalMotivo' + ${pa.idPa}">
                                <i class="bi bi-chat-left-text"></i> Veure Motiu
                            </button>

                            <div class="modal fade" th:id="'modalMotivo' + ${pa.idPa}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header bg-danger text-white">
                                            <h5 class="modal-title">Motiu del Rebuig</h5>
                                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <div class="modal-body">
                                            <p><strong>Candidat PA:</strong> <span th:text="${pa.name + ' ' + pa.surname}"></span></p>
                                            <hr>
                                            <p th:text="${pa.rejectionReason} ?: 'No s\'ha especificat cap motiu.'"></p>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Tancar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pas)}">
                <td colspan="6" class="text-center text-muted py-4">
                    No hi ha cap assistent personal en aquest estat.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a th:href="@{/technical/dashboard}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Tornar
        </a>
    </div>
</main>
</body>
</html>
