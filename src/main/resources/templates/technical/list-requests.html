<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <title>Sol·licituds PA</title>
</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clipboard-list me-2"></i>Llistat de sol·licituds d'assistents personals (PA)</h2>
    </div>

    <div class="mb-3">
        <a th:href="@{/technical/list-requests}" class="btn btn-sm"
           th:classappend="${currentState == 'all' ? 'btn-secondary' : 'btn-outline-secondary'}">Totes</a>

        <a th:href="@{/technical/list-requests/state/pending}" class="btn btn-sm"
           th:classappend="${currentState == 'pending' ? 'btn-warning' : 'btn-outline-warning'}">Pendents</a>

        <a th:href="@{/technical/list-requests/state/accepted}" class="btn btn-sm"
           th:classappend="${currentState == 'accepted' ? 'btn-success' : 'btn-outline-success'}">Acceptades</a>

        <a th:href="@{/technical/list-requests/state/refused}" class="btn btn-sm"
           th:classappend="${currentState == 'refused' ? 'btn-danger' : 'btn-outline-danger'}">Rebutjades</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Data Petició</th>
                    <th>Inici Servei</th>
                    <th>Duració</th>
                    <th>Ciutat</th>
                    <th>Tipus PA</th>
                    <th>Estat</th>
                    <th>Accions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requests}">
                    <td th:text="${req.requestDate}">--</td>
                    <td th:text="${req.startDate}">--</td>
                    <td th:text="${req.duration} + ' mesos'">--</td>
                    <td th:text="${req.city}">--</td>
                    <td th:text="${req.typePa}">--</td>
                    <td>
                        <span class="badge"
                              th:classappend="${(req.state) == 'ACCEPTED' ? 'bg-success' : (req.state == 'REFUSED' ? 'bg-danger' : 'bg-warning')}"
                              th:text="${req.state}">
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <th:block th:if="${currentState == 'pending'}">
                                <a th:href="@{/technical/list-requests/pending/accept/{req_id}(req_id=${req.idRequest})}" class="btn btn-sm btn-success text-white">Acceptar</a>
                                <button type="button" class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#modalExplicarMotivo' + ${req.idRequest}">
                                        Rebutjar
                                </button>

                                <div class="modal fade" th:id="'modalExplicarMotivo' + ${req.idRequest}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <div class="modal-header bg-danger text-white">
                                                <h5 class="modal-title">Especificar el motiu del rebuig</h5>
                                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>

                                            <form th:action="@{/technical/list-requests/pending/refuse/{req_id}(req_id=${req.idRequest})}" method="post">
                                                <div class="modal-body">
                                                        <textarea class="form-control"
                                                                  name="reason"
                                                                  rows="4"
                                                                  placeholder="Escriu el motiu..."
                                                                  required>
                                                        </textarea>
                                                </div>

                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                                                        Cancel·lar
                                                    </button>

                                                    <button type="submit" class="btn btn-danger">
                                                        Rebutjar
                                                    </button>
                                                </div>
                                            </form>

                                        </div>
                                    </div>
                                </div>
                            </th:block>

                            <a th:href="@{/request/view/{id}(id=${req.idRequest})}" class="btn btn-sm btn-outline-primary" >
                                <i class="bi bi-eye"></i> Detalls
                            </a>

                            <th:block th:if="${currentState == 'accepted'}">
                                <a th:href="@{/technical/candidates/list/{id}(id=${req.idRequest})}" class="btn btn-sm btn-info text-white">
                                    <i class="bi bi-people me-1"></i> Candidats
                                </a>
                            </th:block>

                            <th:block th:if="${currentState == 'refused'}">
                                <button type="button" class="btn btn-sm btn-secondary"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#modalMotivo' + ${req.idRequest}">
                                    <i class="bi bi-info-circle me-1"></i> Veure Motiu
                                </button>

                                <div class="modal fade" th:id="'modalMotivo' + ${req.idRequest}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <div class="modal-header bg-danger text-white">
                                                <h5 class="modal-title">Motiu del Rebuig</h5>
                                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>
                                            <div class="modal-body">
                                                <p class="text-dark" th:text="${req.comments} ?: 'No s\'ha especificat cap motiu.'"></p>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Tancar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </th:block>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <a th:href="@{/technical/dashboard}" class="btn btn-link text-decoration-none">
            <i class="bi bi-arrow-left"></i> Tornar al Dashboard
        </a>
    </div>
</div>
</body>
</html>
