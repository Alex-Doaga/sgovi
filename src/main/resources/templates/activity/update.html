<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8"/>
  <title>Nova activitat</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
  <h1>Nova activitat</h1>

  <form th:action="@{/activity/update}" th:object="${activity}" method="post" class="row g-3">

    <div class="col-md-2">
      <label for="idActivity" class="form-label">ID (Opcional)</label>
      <input type="number" class="form-control" id="idActivity" th:field="*{idActivity}" placeholder="Auto"/>
    </div>

    <div class="col-md-10">
      <label for="name" class="form-label">Nom de l'activitat</label>
      <input type="text" class="form-control" id="name" th:field="*{name}" required/>
    </div>

    <div class="col-md-6">
      <label for="typeActivity" class="form-label">Tipus d'activitat</label>
      <select class="form-select" id="typeActivity" th:field="*{typeActivity}" required>
        <option value="" selected disabled>Selecciona un tipus...</option>
        <option value="Formacion">Formació</option>
        <option value="Divulgacion">Divulgació</option>
      </select>
    </div>

    <div class="col-md-6">
      <label for="idInstructor" class="form-label">ID Formador (Responsable)</label>
      <input type="number" class="form-control" id="idInstructor" th:field="*{idInstructor}" required/>
    </div>

    <div class="col-12">
      <label for="description" class="form-label">Descripció</label>
      <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
    </div>

    <div class="col-md-4">
      <label for="date" class="form-label">Data</label>
      <input type="date" class="form-control" id="date" th:field="*{date}" required/>
    </div>

    <div class="col-md-4">
      <label for="place" class="form-label">Lloc</label>
      <input type="text" class="form-control" id="place" th:field="*{place}" required/>
    </div>

    <div class="col-md-4">
      <label for="numberOfParticipants" class="form-label">Nº Participants</label>
      <input type="number" class="form-control" id="numberOfParticipants" th:field="*{numberOfParticipants}" required/>
    </div>

    <div class="col-12 mt-4">
      <button type="submit" class="btn btn-primary">Guardar activitat</button>
      <a th:href="@{/activity/list}" class="btn btn-secondary ms-2">Cancel·lar</a>
    </div>
  </form>
</main>
</body>
</html>
