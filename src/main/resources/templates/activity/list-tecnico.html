<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestió d'Activitats</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main class="container mt-4">
    <h1><i class="bi bi-calendar-event me-2 text-primary"></i>Llista d'Activitats</h1>
    <hr>

    <div th:with="activities=${#lists.isEmpty(activitiesPaged) ? {} : activitiesPaged[__${selectedPage}__]}">
        <table class="table table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th scope="col">Nom</th>
                <th scope="col">Tipus</th>
                <th scope="col">Descripció</th>
                <th scope="col">Data</th>
                <th scope="col">Lloc</th>
                <th scope="col">Participants</th>
                <th scope="col">ID Formador</th>
                <th scope="col">Accions</th>
                <th scope="col"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="activity : ${activities}">
                <td th:text="${activity.name}"></td>
                <td th:text="${activity.typeActivity}"></td>
                <td th:text="${activity.description}"></td>
                <td th:text="${#temporals.format(activity.date, 'dd/MM/yyyy')}"></td>
                <td th:text="${activity.place}"></td>
                <td th:text="${activity.numberOfParticipants}"></td>
                <td th:text="${activity.idInstructor}"></td>
                <td>
                    <a th:href="@{/activity/update/{id}(id=${activity.idActivity})}"
                       class="btn btn-warning btn-sm">Edita</a>
                </td>
                <td>
                    <a th:href="@{/activity/delete/{id}(id=${activity.idActivity})}"
                       class="btn btn-danger btn-sm">Esborra</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(activities)}">
                <td colspan="9" class="text-center py-4 text-muted">No hi ha activitats en aquesta pàgina.</td>
            </tr>
            </tbody>
        </table>

        <nav aria-label="Selecció de pàgina" class="mt-4" th:if="${not #lists.isEmpty(pageNumbers)}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                    th:classappend="${pageNumber == selectedPage + 1} ? 'active'">
                    <a class="page-link"
                       th:href="@{/activity/list(page=${pageNumber - 1})}"
                       th:text="${pageNumber}"></a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="mt-4">
        <a th:href="@{/activity/add}" class="btn btn-success">Afegeix activitat</a>
        <a th:href="@{/}" class="btn btn-secondary ms-2">Tornar</a>
    </div>
</main>
</body>
</html>
