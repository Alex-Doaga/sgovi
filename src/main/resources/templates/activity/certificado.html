<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Certificado de Actividad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/certificado.css}">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="mb-4 text-end">
        <a th:href="@{/activity/list}" class="btn btn-secondary">Volver al listado</a>
    </div>

    <div class="diploma-box text-center shadow-sm bg-white rounded">
        <h1 class="display-4 diploma-title">Certificado de Finalización</h1>
        <p class="lead mt-4">Por la presente se hace constar que se ha completado con éxito la actividad:</p>

        <h2 class="display-6 my-4 text-primary" th:text="${activity?.name}"></h2>

        <p class="italic text-muted" th:text="${activity?.description}"></p>

        <p class="lead">Código de registro oficial: <strong th:text="${activity?.idActivity}"></strong></p>

        <p class="lead" th:if="${activity?.place != null}">
            Celebrada en: <span th:text="${activity.place}"></span>
        </p>

        <p class="lead" th:if="${activity?.date != null}">
            Fecha de expedición:
            <span th:text="${#temporals.format(activity.date, 'dd MMMM yyyy')}"></span>
        </p>

        <div class="mt-5 pt-4 border-top">
            <p class="text-muted small mb-0">Generado automáticamente por el Sistema SGOVI</p>
        </div>
    </div>
</div>

</body>
</html>
