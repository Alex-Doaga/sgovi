<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8"/>
  <title>Nova activitat</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
  <h1>Nova activitat</h1>

  <form th:action="@{/activity/add}"
        th:object="${activity}"
        method="post">
    <div class="col-md-6">
      <label for="idActivity" class="form-label">ID Activitat</label>
      <input type="number" class="form-control" id="idActivity" th:field="*{idActivity}" required/>
    </div>

    <div class="mb-3">
      <label for="name" class="form-label">Nom de la activitat</label>
      <input type="text" class="form-control" id="name"
             th:field="*{name}" required/>
    </div>

    <div class="mb-3">
      <label for="typeActivity" class="form-label">Tipus d'activitat</label>
      <input type="text" class="form-control" id="typeActivity"
             th:field="*{typeActivity}" required/>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Descripció</label>
      <input type="text" class="form-control" id="description"
             th:field="*{description}" required/>
    </div>

    <div class="mb-3">
      <label for="date" class="form-label">Data de l'activitat</label>
      <input type="date" class="form-control" id="date"
             th:field="*{date}" required/>
    </div>

    <div class="mb-3">
      <label for="place" class="form-label">Lloc</label>
      <input type="email" class="form-control" id="place"
             th:field="*{place}" required/>
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Adreça</label>
      <input type="text" class="form-control" id="address"
             th:field="*{address}" required/>
    </div>
    </div>

    <div class="col-md-6">
      <label for="numberOfParticipants" class="form-label">Nombre de participants</label>
      <input type="number" class="form-control" id="numberOfParticipants" th:field="*{numberOfParticipants}" required/>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="list" class="btn btn-secondary ms-2">Cancel·lar</a>
  </form>
</main>
</body>
</html>
