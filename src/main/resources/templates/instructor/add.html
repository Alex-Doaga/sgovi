<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8"/>
  <title>Nou Formador</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">
  <h1>Nou Formador</h1>

  <form th:action="@{/instructor/add}"
        th:object="${instructor}"
        method="post">

    <div class="mb-3">
      <label for="name" class="form-label">Nom</label>
      <input type="text" class="form-control" id="name"
             th:field="*{name}" required/>
    </div>

    <div class="mb-3">
      <label for="surname" class="form-label">Cognoms</label>
      <input type="text" class="form-control" id="surname"
             th:field="*{surname}" required/>
    </div>

    <div class="mb-3">
      <label for="dniNie" class="form-label">DNI/NIE</label>
      <input type="text" class="form-control" id="dniNie"
             th:field="*{dniNie}" required/>
    </div>

    <div class="mb-3">
      <label for="birthDate" class="form-label">Data de naixement</label>
      <input type="date" class="form-control" id="birthDate"
             th:field="*{birthDate}" required/>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email"
             th:field="*{email}" required/>
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Adreça</label>
      <input type="text" class="form-control" id="address"
             th:field="*{address}" required/>
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Telèfon</label>
      <input type="tel" class="form-control" id="phone"
             th:field="*{phone}" required/>
    </div>

    <div class="mb-3">
      <label for="specialization" class="form-label">Especialització</label>
      <input type="text" class="form-control" id="specialization"
             th:field="*{specialization}" required/>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="list" class="btn btn-secondary ms-2">Cancel·lar</a>
  </form>
</main>
</body>
</html>
