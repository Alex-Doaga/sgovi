<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8"/>
    <title>Gestió de Formadors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main class="container mt-4">
    <h1><i class="bi bi-person-badge-fill me-2"></i>Llista de Formadors</h1>
    <hr>

    <div th:with="instructors=${#lists.isEmpty(instructorsPaged) ? {} : instructorsPaged[__${selectedPage}__]}">
        <table class="table table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th scope="col">Nom</th>
                <th scope="col">Cognoms</th>
                <th scope="col">DNI/NIE</th>
                <th scope="col">Email</th>
                <th scope="col">Telèfon</th>
                <th scope="col">Especialització</th>
                <th scope="col">Accions</th>
                <th scope="col"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="instructor : ${instructors}">
                <td th:text="${instructor.name}"></td>
                <td th:text="${instructor.surname}"></td>
                <td th:text="${instructor.dniNie}"></td>
                <td th:text="${instructor.email}"></td>
                <td th:text="${instructor.phone}"></td>
                <td th:text="${instructor.specialization}"></td>
                <td>
                    <a th:href="@{/instructor/update/{id}(id=${instructor.idInstructor})}"
                       class="btn btn-warning btn-sm">Edita</a>
                </td>
                <td>
                    <a th:href="@{/instructor/delete/{id}(id=${instructor.idInstructor})}"
                       class="btn btn-danger btn-sm">Esborra</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(instructors)}">
                <td colspan="8" class="text-center py-4 text-muted">No hi ha formadors registrats.</td>
            </tr>
            </tbody>
        </table>

        <nav aria-label="Selecció de pàgina" class="mt-4" th:if="${not #lists.isEmpty(pageNumbers)}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                    th:classappend="${pageNumber == selectedPage + 1} ? 'active'">
                    <a class="page-link"
                       th:href="@{/instructor/list(page=${pageNumber - 1})}"
                       th:text="${pageNumber}"></a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="mt-4">
        <a th:href="@{/instructor/add}" class="btn btn-success">Afegeix formador</a>
        <a th:href="@{/technical/dashboard}" class="btn btn-secondary ms-2">Tornar</a>
    </div>
</main>
</body>
</html>
