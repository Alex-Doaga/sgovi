<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <title>Gestió Usuaris OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container mt-5">
    <h1>Llistat de Persones Usuàries</h1>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">DNI</th>
            <th scope="col">Nom</th>
            <th scope="col">Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${oviUsers}">
            <td th:text="${user.dniNie}"></td>
            <td th:text="${user.name} + ' ' + ${user.surname}"></td>
            <td>
                <a th:href="@{/oviuser/update/{id}(id=${user.idOviUser})}" role="button" class="btn btn-warning">Editar</a>
                <a th:href="@{/oviuser/delete/{id}(id=${user.idOviUser})}" role="button" class="btn btn-danger">Esborrar</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/oviuser/add}" class="btn btn-primary">Afegir Nou Usuari</a>
</main>
</body>
</html>
