<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>Afegir Nova Persona Usuària - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h1 class="h4 mb-0">Alta de Nova Persona Usuària (OVI)</h1>
                </div>
                <div class="card-body">

                    <form action="#" th:action="@{/oviuser/add}" th:object="${oviuser}" method="post">

                        <fieldset>
                            <legend class="h5 border-bottom pb-2 mb-3 text-primary">Dades Personals</legend>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="dniNie" class="form-label fw-bold">DNI / NIE <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="dniNie" th:field="*{dniNie}" class="form-control" required aria-required="true" placeholder="Ex: 12345678A" />
                                </div>
                                <div class="col-md-4">
                                    <label for="name" class="form-label fw-bold">Nom <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="name" th:field="*{name}" class="form-control" required aria-required="true" />
                                </div>
                                <div class="col-md-4">
                                    <label for="surname" class="form-label fw-bold">Cognoms <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="surname" th:field="*{surname}" class="form-control" required aria-required="true" />
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="birthDate" class="form-label fw-bold">Data de Naixement <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="date" id="birthDate" th:field="*{birthDate}" class="form-control" required aria-required="true" />
                                </div>
                                <div class="col-md-4">
                                    <label for="phone" class="form-label fw-bold">Telèfon <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="tel" id="phone" th:field="*{phone}" class="form-control" required aria-required="true" />
                                </div>
                                <div class="col-md-4">
                                    <label for="email" class="form-label fw-bold">Correu Electrònic <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="email" id="email" th:field="*{email}" class="form-control" required aria-required="true" />
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mt-4">
                            <legend class="h5 border-bottom pb-2 mb-3 text-primary">Adreça i Contacte</legend>

                            <div class="row mb-3">
                                <div class="col-md-12 mb-3">
                                    <label for="address" class="form-label fw-bold">Adreça Completa <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="address" th:field="*{address}" class="form-control" required aria-required="true" placeholder="Ex: Carrer Major, 1, Pta 2" />
                                </div>
                                <div class="col-md-8">
                                    <label for="city" class="form-label fw-bold">Població <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="city" th:field="*{city}" class="form-control" required aria-required="true" />
                                </div>
                                <div class="col-md-4">
                                    <label for="postalCode" class="form-label fw-bold">Codi Postal <span class="text-danger" title="Camp obligatori" aria-hidden="true">*</span></label>
                                    <input type="text" id="postalCode" th:field="*{postalCode}" class="form-control" required aria-required="true" maxlength="5" />
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mt-4">
                            <legend class="h5 border-bottom pb-2 mb-3 text-primary">Dades de Dependència i Serveis</legend>

                            <div class="row mb-3 align-items-center">
                                <div class="col-md-4">
                                    <div class="form-check form-switch fs-5 mt-2">
                                        <input class="form-check-input" type="checkbox" id="hasDepenDegree" th:field="*{hasDepenDegree}">
                                        <label class="form-check-label fw-bold" for="hasDepenDegree">
                                            Té grau de dependència?
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-8">
                                    <label for="depenDegree" class="form-label fw-bold">Grau de dependència (1, 2 o 3)</label>
                                    <input type="number" id="depenDegree" th:field="*{depenDegree}" class="form-control" min="1" max="3" placeholder="Deixar en blanc si no en té" />
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="socialServiceCenter" class="form-label fw-bold">Centre de Serveis Socials</label>
                                    <input type="text" id="socialServiceCenter" th:field="*{socialServiceCenter}" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label for="projectLifeDoc" class="form-label fw-bold">Document / Notes de Projecte de Vida</label>
                                    <textarea id="projectLifeDoc" th:field="*{projectLifeDoc}" class="form-control" rows="1"></textarea>
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mt-4">
                            <legend class="h5 border-bottom pb-2 mb-3 text-primary">Dades del Tutor i Entitat (Opcional)</legend>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label for="entity" class="form-label fw-bold">Entitat de referència</label>
                                    <input type="text" id="entity" th:field="*{entity}" class="form-control" />
                                </div>
                                <div class="col-md-4">
                                    <label for="nameTutor" class="form-label fw-bold">Nom del Tutor/a (si s'escau)</label>
                                    <input type="text" id="nameTutor" th:field="*{nameTutor}" class="form-control" />
                                </div>
                                <div class="col-md-4">
                                    <label for="dniNieTutor" class="form-label fw-bold">DNI/NIE del Tutor/a</label>
                                    <input type="text" id="dniNieTutor" th:field="*{dniNieTutor}" class="form-control" />
                                </div>
                            </div>
                        </fieldset>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                            <a th:href="@{/oviuser/list}" class="btn btn-outline-secondary me-md-2" aria-label="Cancel·lar i tornar al llistat">Cancel·lar</a>
                            <button type="submit" class="btn btn-primary" aria-label="Guardar nova persona usuària">Guardar Usuari</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
