<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SGOVI - Confirmar Acceptació de Sol·licitud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<main class="container mt-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-header bg-success text-white py-3">
            <h5 class="mb-0"><i class="bi bi-check-circle me-2"></i>Confirmar Acceptació de Sol·licitud</h5>
        </div>
        <div class="card-body p-4">
            <p class="fs-5">Estàs a punt d'acceptar la sol·licitud de servei número:</p>
            <p class="fs-4 fw-bold text-center text-success my-3" th:text="'#' + ${request.idRequest}"></p>

            <div class="bg-light p-3 rounded mb-3 border">
                <p class="mb-1"><strong>Tipus de PA sol·licitat:</strong> <span th:text="${request.typePa}"></span></p>
                <p class="mb-1"><strong>Ciutat:</strong> <span th:text="${request.city}"></span></p>
                <p class="mb-0"><strong>Data d'inici prevista:</strong> <span th:text="${request.startDate}"></span></p>
            </div>

            <p class="text-muted text-center small">Això canviarà l'estat a <strong>acceptada</strong> i serà visible per als assistents personals disponibles.</p>
        </div>
        <div class="card-footer bg-white d-flex justify-content-end gap-2 p-3 border-top-0">
            <a th:href="@{/technical/list-requests/state/pending}" class="btn btn-outline-secondary">Cancel·lar</a>
            <form th:action="@{/request/accept/{id}(id=${request.idRequest})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-success">Confirmar Acceptació</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
