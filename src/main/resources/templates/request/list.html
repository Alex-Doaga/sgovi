<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/list.css}">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <title>Les meues Sol·licituds</title>
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-clipboard-list me-2"></i>Les meues Sol·licituds AP</h2>
    <a th:href="@{/request/add/{id}(id=${userId})}" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i> Nova Sol·licitud
    </a>
  </div>

  <div class="mb-3">
    <a th:href="@{/request/list/user/{id}(id=${userId})}" class="btn btn-sm"
       th:classappend="${currentState == 'all' ? 'btn-secondary' : 'btn-outline-secondary'}">Totes</a>

    <a th:href="@{/request/list/user/{id}/pending(id=${userId})}" class="btn btn-sm"
       th:classappend="${currentState == 'pending' ? 'btn-warning' : 'btn-outline-warning'}">Pendents</a>

    <a th:href="@{/request/list/user/{id}/accepted(id=${userId})}" class="btn btn-sm"
       th:classappend="${currentState == 'accepted' ? 'btn-success' : 'btn-outline-success'}">Acceptades</a>

    <a th:href="@{/request/list/user/{id}/refused(id=${userId})}" class="btn btn-sm"
       th:classappend="${currentState == 'refused' ? 'btn-danger' : 'btn-outline-danger'}">Rebutjades</a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
          <th>Data Petició</th>
          <th>Inici Servei</th>
          <th>Duració</th>
          <th>Ciutat</th>
          <th>Tipus PA</th>
          <th>Gènere</th>
          <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
          <td th:text="${req.requestDate}">--</td>
          <td th:text="${req.startDate}">--</td>
          <td th:text="${req.duration} + ' mesos'">--</td>
          <td th:text="${req.city}">--</td>
          <td th:text="${req.typePa}">--</td>
          <td>
            <span th:if="${req.requiredGender != null and req.requiredGender.name() == 'MALE'}" >Home</span>
            <span th:if="${req.requiredGender != null and req.requiredGender.name() == 'FEMALE'}" >Dona</span>
            <span th:if="${req.requiredGender != null and req.requiredGender.name() == 'OTHER'}" >Altre</span>
            <span th:if="${req.requiredGender == null}" class="badge bg-light text-dark">Indiferent</span>
          </td>
          <td>
            <div class="d-flex gap-2">

              <a th:href="@{/request/view/{id}(id=${req.idRequest})}" class="btn btn-sm btn-outline-primary" title="Vore sol·licitud">
                <i class="bi bi-eye"></i> Vore
              </a>

              <th:block th:if="${currentState == 'accepted'}">
                <a th:href="@{/request/candidates/{id}(id=${req.idRequest})}" class="btn btn-sm btn-candidats">
                  <i class="bi bi-people me-1"></i> Veure candidats
                </a>
                <th:block th:if="${currentState == 'accepted'}">
                  <a th:href="@{/request/candidates/{id}(id=${req.idRequest})}" class="btn btn-sm btn-info text-white">
                    <i class="bi bi-people me-1"></i> Veure candidats
                  </a>
                </th:block>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="7" class="text-center py-4 text-muted">No hi ha sol·licituds en aquesta pàgina.</td>
          </tr>
          </tbody>
        </table>
      </div>

      <nav aria-label="Selecció de pàgina" class="mt-4" th:if="${not #lists.isEmpty(pageNumbers)}">
        <ul class="pagination justify-content-center">
          <li class="page-item" th:each="pageNumber : ${pageNumbers}"
              th:classappend="${pageNumber == selectedPage + 1} ? 'active'">
            <a class="page-link"
               th:href="@{${currentState == 'all' ? '/request/list/user/' + userId : '/request/list/user/' + userId + '/' + currentState}(page=${pageNumber - 1})}"
               th:text="${pageNumber}"></a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
  <div class="mt-3">
    <a th:href="@{/ovi-user/dashboard}" class="btn btn-link text-decoration-none">
      <i class="bi bi-arrow-left"></i> Tornar al Dashboard
    </a>
  </div>
</div>
</body>
</html>
