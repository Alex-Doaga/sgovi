<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalls de la Sol·licitud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">
            <i class="bi bi-file-earmark-text me-2"></i>Detalls de la Sol·licitud
        </h2>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Tornar a la llista
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 text-muted">Informació General</h5>
        </div>
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="text-muted small text-uppercase fw-bold">Data de Petició</label>
                    <p class="fs-5" th:text="${request.getRequestDate()}">--</p>

                    <label class="text-muted small text-uppercase fw-bold">Inici del Servei</label>
                    <p class="fs-5" th:text="${request.getStartDate()}">--</p>

                    <label class="text-muted small text-uppercase fw-bold">Duració</label>
                    <p class="fs-5" th:text="${request.getDuration()} + ' mesos'">--</p>

                    <label class="text-muted small text-uppercase fw-bold">Ciutat</label>
                    <p class="fs-5" th:text="${request.getCity().getLabel()}">--</p>
                </div>
                <div class="col-md-6">
                    <label class="text-muted small text-uppercase fw-bold">Tipus de PA</label>
                    <p class="fs-5" th:text="${request.getTypePa()}">--</p>

                    <label class="text-muted small text-uppercase fw-bold">Gènere Requerit</label>
                    <p class="fs-5" th:text="${request.getRequiredGender().getLabel()}">--</p>

                    <label class="text-muted small text-uppercase fw-bold">Edat aproximada PA</label>
                    <p class="fs-5" th:text="${request.getAgePa()} + ' anys'">--</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 text-muted">Perfil i Requisits</h5>
        </div>
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="text-muted small text-uppercase fw-bold">Formació</label>
                <p th:text="${request.getEducation().getLabel()} ?: 'No especificada'"></p>
            </div>
            <div class="mb-3">
                <label class="text-muted small text-uppercase fw-bold">Experiència</label>
                <p th:text="${request.getExperience()} ?: 'No especificada'"></p>
            </div>
            <div class="mb-0">
                <label class="text-muted small text-uppercase fw-bold">Afició</label>
                <p th:text="${request.getHobbies().getLabel()} ?: 'Cap afició especificada'"></p>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 text-muted">Comentaris o Motius</h5>
        </div>
        <div class="card-body p-4">
            <p class="mb-0 italic" th:text="${request.getComments()} ?: 'Sense comentaris addicionals.'"></p>
        </div>
    </div>

    <div th:if="${isReviewMode}" class="mt-4 p-3 bg-light rounded border d-flex gap-2 align-items-center">
        <h5 class="w-100 mb-0 text-muted">
            <i class="bi bi-shield-shaded me-2"></i>Accions de revisió tècnica:
        </h5>

        <a th:href="@{/request/accept/confirm/{id}(id=${request.idRequest})}" class="btn btn-success text-nowrap">
            <i class="bi bi-check-circle me-1"></i> Acceptar Sol·licitud
        </a>

        <a th:href="@{/request/reject/{id}(id=${request.idRequest})}" class="btn btn-danger text-nowrap">
            <i class="bi bi-x-circle me-1"></i> Rebutjar Sol·licitud
        </a>
    </div>



</div>

</body>
</html>
